<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Protocol Ultimate</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css">

<body>

<!-- Loader -->
<div class="loader">
  <h1>GHOST</h1>
</div>

<!-- Cursor -->
<div class="cursor"></div>

<!-- Navbar -->
<nav class="navbar glass">

    <li>Home</li>
    <li>Features</li>
    <li>System</li>
    <li>Contact</li>

<!-- Hero -->
<section class="hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <h1 class="glow">Ghost Protocol</h1>
    <p>Next-gen intelligence beyond reality</p>
    <button class="cta-btn">Enter System</button>
  </div>
</section>

<!-- Features -->
<section class="features">
  <h2>Ecosystem</h2>
  <div class="cards">
    <div class="card glass">Security</div>
    <div class="card glass">Speed</div>
    <div class="card glass">AI Core</div>
  </div>

<footer>
  <p>© 2026 Ghost Protocol</p>
</footer>

<script src="script.js"></script>
